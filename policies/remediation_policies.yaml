version: "1.0"

global_constraints:
  require_human_approval_for:
    - unknown_failure
    - schema_drift
  maximum_automatic_retries: 3
  preserve_original_data: true
  write_incident_evidence: true

policies:
  healthy_control:
    action: continue_pipeline
    automatic: true
    allowed_severities:
      - none

  source_failure:
    action: retry_with_exponential_backoff
    automatic: true
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      maximum_retries: 3
      initial_delay_seconds: 1
      backoff_multiplier: 2

  schema_drift:
    action: quarantine_and_alert
    automatic: false
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      quarantine_dataset: true
      notify_owner: true

  missing_value_spike:
    action: quarantine_invalid_rows
    automatic: true
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      retain_valid_rows: true
      reject_null_required_fields: true

  duplicate_generation:
    action: deduplicate_keep_first
    automatic: true
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      key_columns:
        - order_id
      preserve_first_record: true

  freshness_violation:
    action: retry_source_refresh
    automatic: true
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      maximum_retries: 2
      reject_stale_records_after_failure: true

  volume_anomaly:
    action: hold_and_alert
    automatic: false
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      block_downstream_publish: true
      notify_owner: true

  unknown_failure:
    action: escalate_for_manual_review
    automatic: false
    allowed_severities:
      - low
      - medium
      - high
    parameters:
      block_downstream_publish: true
      preserve_failure_context: true
